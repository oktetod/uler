<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>GudangUlat 🐛</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0e0c09;--bg2:#181410;--bg3:#221d17;--card:#1c1811;--border:#2d2720;--accent:#c97d30;--accent2:#e09a50;--gold:#edb84a;--text:#e8ddd0;--text2:#9e9080;--text3:#6a6050;--plus:#4caf7d;--minus:#e05c5c;--nav-h:68px;--r:14px}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");opacity:.5}

    /* SCREENS */
    .screen{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
    .screen.hidden{display:none}
    #login-screen{background:radial-gradient(ellipse at 50% 0%,#2a1a08 0%,var(--bg) 65%)}
    .login-logo{font-size:4rem;margin-bottom:8px;animation:pulse 3s ease-in-out infinite}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
    .login-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;color:var(--accent2);letter-spacing:-1px}
    .login-tagline{color:var(--text3);font-size:.8rem;margin-bottom:36px;text-align:center}
    .login-box{width:100%;max-width:340px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px}
    .login-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:var(--accent2);margin-bottom:16px;text-align:center}
    .login-footer-dev{margin-top:28px;text-align:center;font-size:.7rem;color:var(--text3)}
    .login-footer-dev a{color:var(--accent);text-decoration:none}

    /* APP */
    #app{position:relative;z-index:1;padding-bottom:calc(var(--nav-h) + 24px);min-height:100vh;display:none}
    #content{padding:0 16px 16px;max-width:500px;margin:0 auto}

    /* TOPBAR */
    #topbar-wrap{position:sticky;top:0;z-index:30;background:rgba(14,12,9,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
    #topbar{max-width:500px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
    .topbar-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:var(--accent2);display:flex;align-items:center;gap:6px}
    #btn-logout{background:none;border:1px solid var(--border);color:var(--text3);font-size:.7rem;padding:4px 10px;border-radius:20px;cursor:pointer}

    /* PAGE HEADER */
    .ph{display:flex;align-items:center;gap:12px;padding:20px 0 14px}
    .ph-icon{font-size:2rem;line-height:1}
    .ph-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;color:var(--accent2);letter-spacing:-.5px}
    .ph-sub{font-size:.78rem;color:var(--text3);margin-top:2px}

    /* CARD */
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}

    /* STATS */
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
    .sc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:4px}
    .sc.accent{border-color:var(--accent);background:linear-gradient(135deg,#2a1e10,#1c1811)}
    .sc.pos{border-color:#2d6644}.sc.neg{border-color:#6b2d2d}
    .sc-icon{font-size:1.3rem}.sc-val{font-family:'Syne',sans-serif;font-weight:700;font-size:1.2rem;color:var(--accent2)}
    .sc-lbl{font-size:.72rem;color:var(--text2)}
    .sc-badge{font-size:.68rem;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:20px;display:inline-block;margin-top:2px}

    /* SECTION LABEL */
    .sl{font-family:'Syne',sans-serif;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin:16px 0 8px;font-weight:600}

    /* BATCH */
    .bc{border-left:3px solid var(--accent)}.bc.done{border-left-color:var(--text3);opacity:.8}
    .bt{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px}
    .ptb{background:var(--bg3);border:1px solid var(--border);color:var(--accent2);font-size:.78rem;font-weight:500;padding:3px 10px;border-radius:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:58%}
    .tgt{font-size:.72rem;color:var(--text3);white-space:nowrap}
    .bb{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:6px}
    .bkg{font-size:.88rem;color:var(--text)}.bkg strong{color:var(--gold);font-size:.95rem}
    .bnote{font-size:.73rem;color:var(--text3);font-style:italic}
    .bst{font-size:.73rem;padding:3px 0}.bst.p{color:var(--accent)}.bst.d{color:var(--plus)}
    .bdel{background:none;border:1px solid #3e2020;color:var(--minus);font-size:.72rem;padding:3px 10px;border-radius:6px;margin-top:4px;cursor:pointer}
    .brow{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:8px 0}
    .ri{text-align:center}.ri-l{font-size:.66rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
    .ri-v{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;color:var(--text)}
    .asep{color:var(--text3);font-size:1rem}
    .schip{font-size:.82rem;font-weight:600;padding:4px 10px;border-radius:20px;margin-left:auto}
    .schip.pl{background:#1a3d2a;color:var(--plus)}.schip.mn{background:#3d1a1a;color:var(--minus)}
    .schip .pct{font-weight:400;font-size:.72rem;opacity:.8}
    .plus{color:var(--plus)}.minus{color:var(--minus)}

    /* FORM */
    .fc{margin-bottom:20px}
    .ft{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;color:var(--accent2);margin-bottom:14px}
    .lbl{display:block;font-size:.72rem;color:var(--text3);margin-bottom:4px;margin-top:10px;text-transform:uppercase;letter-spacing:.05em}
    .inp{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:.93rem;transition:border-color .2s;-webkit-appearance:none}
    .inp:focus{outline:none;border-color:var(--accent)}
    .inp option{background:var(--bg2)}
    .btn-p{width:100%;margin-top:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#0e0c09;font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;padding:13px;cursor:pointer;box-shadow:0 4px 20px rgba(201,125,48,.3);transition:transform .15s,box-shadow .15s;-webkit-appearance:none}
    .btn-p:active{transform:scale(.97);box-shadow:0 2px 8px rgba(201,125,48,.15)}
    .btn-s{width:100%;margin-top:10px;background:none;border:1px solid var(--border);border-radius:12px;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:.88rem;padding:11px;cursor:pointer}

    /* PREVIEW */
    .sprev{margin-top:10px;padding:10px 14px;border-radius:10px;font-size:.88rem;text-align:center;display:none}
    .sprev.pos{background:#1a3d2a;color:var(--plus);display:block}
    .sprev.neg{background:#3d1a1a;color:var(--minus);display:block}

    /* PETERNAK */
    .ptr{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .pti{display:flex;align-items:center;gap:12px}
    .ptav{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0e0c09;font-family:'Syne',sans-serif;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
    .ptn{font-weight:500;font-size:.93rem;color:var(--text)}
    .ptm{font-size:.72rem;color:var(--text3);margin-top:1px}
    .btn-del{background:none;border:1px solid #3e2020;color:var(--minus);padding:6px 10px;border-radius:8px;cursor:pointer;font-size:.95rem;flex-shrink:0}

    /* EMPTY */
    .empty{text-align:center;color:var(--text3);padding:32px 16px;font-size:.88rem;border:1px dashed var(--border);border-radius:var(--r);margin-bottom:10px}

    /* NAV */
    #nav{position:fixed;bottom:0;left:0;right:0;z-index:40;height:var(--nav-h);background:rgba(16,13,10,.93);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding-bottom:env(safe-area-inset-bottom,0px)}
    .nb{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:8px 10px;border-radius:12px;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:.64rem;transition:color .2s;flex:1;min-width:0}
    .niw{display:flex;justify-content:center;width:100%}
    .ni{font-size:1.3rem;line-height:1;display:block}
    .nb.active{color:var(--accent2)}
    .nb.active .niw{background:rgba(201,125,48,.12);border-radius:10px;padding:2px 0}

    /* TOAST */
    #toast{position:fixed;bottom:calc(var(--nav-h) + 14px);left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 20px;border-radius:30px;font-size:.82rem;z-index:200;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4);pointer-events:none;opacity:0;transition:opacity .3s}
    #toast.show{opacity:1}
    #toast.ok{border-color:#2d5a3a;color:var(--plus)}
    #toast.err{border-color:#5a2d2d;color:var(--minus)}

    /* INFO / PANDUAN / ABOUT */
    .tab-row{display:flex;gap:8px;margin-bottom:16px}
    .tabb{flex:1;padding:9px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);color:var(--text3);font-family:'Syne',sans-serif;font-weight:600;font-size:.78rem;cursor:pointer;transition:all .2s}
    .tabb.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0e0c09;border-color:transparent}
    .gs{display:flex;gap:14px;margin-bottom:16px}
    .gsn{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0e0c09;font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
    .gsb .gst{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;color:var(--accent2);margin-bottom:4px}
    .gsb p{font-size:.82rem;color:var(--text2);line-height:1.5}
    .gstip{font-size:.76rem;color:var(--text3);background:var(--bg3);padding:6px 10px;border-radius:8px;margin-top:6px;border-left:2px solid var(--accent)}
    .fi{display:flex;align-items:flex-start;gap:10px;font-size:.83rem;color:var(--text2);margin-bottom:9px}
    .ficon{font-size:1.1rem;flex-shrink:0;margin-top:1px}
    .devc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center}
    .devav{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0e0c09;font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
    .devn{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;color:var(--accent2)}
    .devr{font-size:.75rem;color:var(--text3);margin-top:2px;margin-bottom:14px}
    .dlb{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 16px;border-radius:12px;font-size:.85rem;font-weight:500;text-decoration:none;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;width:100%;margin-bottom:8px;transition:opacity .2s}
    .dlb:active{opacity:.75}
    .bwa{background:#1a3d28;color:#4caf7d;border:1px solid #2d6644}
    .bdana{background:#1a2a4a;color:#5b9ef0;border:1px solid #2d4a80}
    .dno{font-size:.72rem;color:var(--text3);text-align:center;margin-top:8px}
    .cmsg{background:linear-gradient(135deg,#1e1608,#0e0c09);border:1px solid #3a2d10;border-radius:var(--r);padding:16px;margin-top:12px;text-align:center}
    .cmsg p{font-size:.83rem;color:var(--text2);line-height:1.6}
    .csign{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;color:var(--gold);margin-top:8px}
    .sr{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
    .sr:last-child{border-bottom:none}
    .sl2{font-size:.88rem;color:var(--text)}.ssub{font-size:.72rem;color:var(--text3);margin-top:2px}
    .cpf{background:var(--bg3);border-radius:var(--r);padding:14px;margin-top:10px;display:none}
    .cpf.open{display:block}
    .sec-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.72rem;color:var(--accent);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="screen">
  <div class="login-logo">🐛</div>
  <div class="login-brand">GudangUlat</div>
  <div class="login-tagline">Manajemen Stok Ulat Hongkong</div>
  <div class="login-box">
    <div id="ltitle" class="login-title">Masuk ke Aplikasi</div>
    <div id="f-login">
      <label class="lbl">Password</label>
      <input id="ip" class="inp" type="password" placeholder="Masukkan password..." autocomplete="current-password"/>
      <button class="btn-p" id="btn-login">🔓 Masuk</button>
      <div id="lerr" style="color:var(--minus);font-size:.78rem;text-align:center;margin-top:10px;display:none">Password salah. Coba lagi.</div>
    </div>
    <div id="f-setup" style="display:none">
      <p style="font-size:.8rem;color:var(--text3);margin-bottom:12px;text-align:center">Selamat datang! Buat password untuk melindungi aplikasi.</p>
      <label class="lbl">Password Baru</label>
      <input id="is1" class="inp" type="password" placeholder="Minimal 4 karakter..."/>
      <label class="lbl">Ulangi Password</label>
      <input id="is2" class="inp" type="password" placeholder="Ulangi password..."/>
      <button class="btn-p" id="btn-setup">✅ Simpan & Masuk</button>
      <div id="serr" style="color:var(--minus);font-size:.78rem;text-align:center;margin-top:10px;display:none"></div>
    </div>
  </div>
  <div class="login-footer-dev">Dikembangkan oleh <a href="https://wa.me/+6288991568151" target="_blank">Bayu Satrio</a> · © 2025</div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div id="topbar-wrap">
    <div id="topbar">
      <div class="topbar-brand"><span>🐛</span> GudangUlat</div>
      <button id="btn-logout">Keluar</button>
    </div>
  </div>
  <div id="content"></div>
  <div id="app-footer" style="text-align:center;padding:20px 16px 8px;border-top:1px solid var(--border);max-width:500px;margin:0 auto">
    <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;color:var(--accent)">🐛 GudangUlat</div>
    <div style="font-size:.68rem;color:var(--text3);margin-top:3px">© 2025 Bayu Satrio · All rights reserved</div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav id="nav" style="display:none">
  <button class="nb" data-page="dashboard"><div class="niw"><span class="ni">🏠</span></div>Dashboard</button>
  <button class="nb" data-page="masuk"><div class="niw"><span class="ni">⬇️</span></div>Masuk</button>
  <button class="nb" data-page="keluar"><div class="niw"><span class="ni">⬆️</span></div>Keluar</button>
  <button class="nb" data-page="peternak"><div class="niw"><span class="ni">👨‍🌾</span></div>Peternak</button>
  <button class="nb" data-page="info"><div class="niw"><span class="ni">ℹ️</span></div>Info</button>
</nav>

<div id="toast"></div>

<script type="module">
  import { firebaseConfig } from './firebase-config.js';
  import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, doc, deleteDoc, query, orderBy, onSnapshot, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, signInAnonymously, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const fbApp = initializeApp(firebaseConfig);
  const db    = getFirestore(fbApp);
  const auth  = getAuth(fbApp);

  const KP = 'gu_pw', KS = 'gu_sess', KPG = 'gu_page';
  const TTL = 7 * 864e5;

  let page = 'dashboard', infoTab = 'panduan';
  let allPt = [], allM = [], allK = [];

  /* ── HASH ── */
  function h(s){ let r=5381; for(let i=0;i<s.length;i++) r=((r<<5)+r)^s.charCodeAt(i); return (r>>>0).toString(36); }

  /* ── SESSION ── */
  const sessOK  = () => { const s=localStorage.getItem(KS); return s && Date.now()-+s < TTL; };
  const saveSess= () => localStorage.setItem(KS, Date.now());
  const clearSess=()=> localStorage.removeItem(KS);
  const getPW   = () => localStorage.getItem(KP);

  /* ── LOGIN ── */
  function initLogin(){
    if(!getPW()){
      document.getElementById('ltitle').textContent='Buat Password';
      document.getElementById('f-login').style.display='none';
      document.getElementById('f-setup').style.display='block';
    }
    document.getElementById('btn-login').onclick=()=>{
      const v=document.getElementById('ip').value;
      if(h(v)===getPW()){ saveSess(); bootApp(); }
      else{ document.getElementById('lerr').style.display='block'; document.getElementById('ip').value=''; document.getElementById('ip').focus(); }
    };
    document.getElementById('ip').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('btn-login').click(); });
    document.getElementById('btn-setup').onclick=()=>{
      const p1=document.getElementById('is1').value, p2=document.getElementById('is2').value, er=document.getElementById('serr');
      if(p1.length<4){ er.textContent='Minimal 4 karakter.'; er.style.display='block'; return; }
      if(p1!==p2){ er.textContent='Password tidak cocok.'; er.style.display='block'; return; }
      localStorage.setItem(KP,h(p1)); saveSess(); bootApp();
    };
  }

  document.getElementById('btn-logout').onclick=()=>{
    if(!confirm('Keluar dari aplikasi?')) return;
    clearSess();
    document.getElementById('app').style.display='none';
    document.getElementById('nav').style.display='none';
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('ip').value='';
    document.getElementById('lerr').style.display='none';
  };

  /* ── BOOT ── */
  function bootApp(){
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').style.display='block';
    document.getElementById('nav').style.display='flex';
    signInAnonymously(auth).catch(e=> toast('Firebase error: '+e.code,'err'));
    onAuthStateChanged(auth, u=>{ if(u) startRT(); });
    nav(localStorage.getItem(KPG)||'dashboard', false);
  }

  /* ── REALTIME ── */
  let rtOn=false;
  function startRT(){
    if(rtOn) return; rtOn=true;
    onSnapshot(query(collection(db,'peternak'),orderBy('nama')), s=>{ allPt=s.docs.map(d=>({id:d.id,...d.data()})); renderNow(); });
    onSnapshot(query(collection(db,'masuk'),orderBy('tanggalMasuk','desc')), s=>{ allM=s.docs.map(d=>({id:d.id,...d.data()})); renderNow(); });
    onSnapshot(query(collection(db,'keluar'),orderBy('tanggalKeluar','desc')), s=>{ allK=s.docs.map(d=>({id:d.id,...d.data()})); renderNow(); });
  }
  function renderNow(){
    if(page==='dashboard') rDash();
    else if(page==='masuk') rMasuk();
    else if(page==='keluar') rKeluar();
    else if(page==='peternak') rPt();
    else if(page==='info') rInfo();
  }

  /* ── HELPERS ── */
  const fTgl=s=>{ if(!s) return '-'; return new Date(s).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}); };
  const fKg=v=>{ const n=parseFloat(v)||0; return n>=100?(n/100).toFixed(2)+' kw':n.toFixed(1)+' kg'; };
  const getK=mid=> allK.find(k=>k.masukId===mid)||null;
  const getPtN=id=>{ const p=allPt.find(p=>p.id===id); return p?p.nama:id; };
  const todayISO=()=> new Date().toISOString().slice(0,10);

  /* ── NAV ── */
  function nav(p, save=true){
    page=p; if(save) localStorage.setItem(KPG,p);
    document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('active',b.dataset.page===p));

  /* ══════════════ DASHBOARD ══════════════ */

        <div class="sc ${tSel>=0?'pos':'neg'}"><div class="sc-icon">${tSel>=0?'📈':'📉'}</div><div class="sc-val">${tSel>=0?'+':''}${fKg(tSel)}</div><div class="sc-lbl">Selisih Total</div><div class="sc-badge">${sl.length} selesai</div></div>
        <div class="sc"><div class="sc-icon">⬇️</div><div class="sc-val">${fKg(tmKg)}</div><div class="sc-lbl">Total Masuk</div></div>
        <div class="sc"><div class="sc-icon">⬆️</div><div class="sc-val">${fKg(tkKg)}</div><div class="sc-lbl">Total Keluar</div></div>

      ${dg.map(m=>`
        <div class="card bc"><div class="bt"><span class="ptb">${getPtN(m.peternakId)}</span><span class="tgt">${fTgl(m.tanggalMasuk)}</span></div>
        <div class="bb"><span class="bkg">Masuk: <strong>${fKg(m.jumlahKg)}</strong></span>${m.catatan?`<span class="bnote">${m.catatan}</span>`:''}</div>
        <div class="bst p">⏳ Menunggu penimbangan keluar</div></div>`).join('')}
      <div class="sl" style="margin-top:20px">Riwayat Terakhir</div>
      ${sl.length===0?'<div class="empty">Belum ada yang selesai</div>':''}
      ${sl.slice(0,5).map(m=>{ const k=getK(m.id); const sel=(parseFloat(k.jumlahKg)||0)-(parseFloat(m.jumlahKg)||0); return `
        <div class="card bc done"><div class="bt"><span class="ptb">${getPtN(m.peternakId)}</span><span class="tgt">${fTgl(m.tanggalMasuk)} → ${fTgl(k.tanggalKeluar)}</span></div>
        <div class="brow"><div class="ri"><div class="ri-l">Masuk</div><div class="ri-v">${fKg(m.jumlahKg)}</div></div><div class="asep">→</div>
        <div class="ri"><div class="ri-l">Keluar</div><div class="ri-v">${fKg(k.jumlahKg)}</div></div>
        <div class="schip ${sel>=0?'pl':'mn'}">${sel>=0?'▲':'▼'} ${fKg(Math.abs(sel))}<span class="pct"> (${m.jumlahKg>0?((sel/m.jumlahKg)*100).toFixed(1):0}%)</span></div></div></div>`; }).join('')}
    `;

  /* ══════════════ PETERNAK ══════════════ */
  function rPt(){
    document.getElementById('content').innerHTML=`
      <div class="ph"><div class="ph-icon">👨‍🌾</div><div><div class="ph-title">Peternak</div><div class="ph-sub">Kelola daftar peternak</div></div></div>
      <div class="card fc"><div class="ft">Tambah Peternak Baru</div>
        <input id="iptn" class="inp" type="text" placeholder="Nama peternak..." maxlength="50"/>
        <button class="btn-p" id="btn-apt">+ Tambah Peternak</button></div>
      <div class="sl">${allPt.length} Peternak Terdaftar</div>
      ${allPt.length===0?'<div class="empty">Belum ada peternak 👨‍🌾</div>':''}
      ${allPt.map(p=>{ const bs=allMasuk_safe().filter(m=>m.peternakId===p.id); const ak=bs.filter(m=>!getK(m.id)).length; return `
        <div class="card ptr"><div class="pti"><div class="ptav">${p.nama.charAt(0).toUpperCase()}</div>
        <div><div class="ptn">${p.nama}</div><div class="ptm">${bs.length} batch · ${ak} aktif</div></div></div>
        <button class="btn-del" onclick="window._dPt('${p.id}','${p.nama.replace(/'/g,"\\'").replace(/"/g,"&quot;")}')">🗑</button></div>`; }).join('')}
    `;
    document.getElementById('btn-apt').onclick=async()=>{
      const n=document.getElementById('iptn').value.trim();
      if(!n) return toast('Masukkan nama peternak','err');
      if(allPt.find(p=>p.nama.toLowerCase()===n.toLowerCase())) return toast('Nama sudah terdaftar','err');
      await addDoc(collection(db,'peternak'),{nama:n,createdAt:serverTimestamp()});
      document.getElementById('iptn').value=''; toast('Peternak ditambahkan ✓');
    };
  }
  function allMasuk_safe(){ return allM; }
  window._dPt=async(id,n)=>{
    if(allM.find(m=>m.peternakId===id)) return toast('Tidak bisa hapus: ada data masuk','err');
    if(!confirm(`Hapus peternak "${n}"?`)) return;
    await deleteDoc(doc(db,'peternak',id)); toast('Dihapus');
  };

  /* ══════════════ MASUK ══════════════ */
  function rMasuk(){
    document.getElementById('content').innerHTML=`
      <div class="ph"><div class="ph-icon">⬇️</div><div><div class="ph-title">Masuk Gudang</div><div class="ph-sub">Catat panenan masuk</div></div></div>
      <div class="card fc"><div class="ft">Catat Panen Masuk</div>
        <label class="lbl">Peternak</label>
        <select id="smp" class="inp"><option value="">-- Pilih Peternak --</option>${allPt.map(p=>`<option value="${p.id}">${p.nama}</option>`).join('')}</select>
        <label class="lbl">Tanggal Masuk</label><input id="imt" class="inp" type="date" value="${todayISO()}"/>
        <label class="lbl">Berat Masuk (kg)</label><input id="imk" class="inp" type="number" min="0.1" step="0.1" placeholder="0.0"/>

        <div class="card bc ${k?'done':''}"><div class="bt"><span class="ptb">${getPtN(m.peternakId)}</span><span class="tgt">${fTgl(m.tanggalMasuk)}</span></div>
        <div class="bb"><span class="bkg">Masuk: <strong>${fKg(m.jumlahKg)}</strong></span>${m.catatan?`<span class="bnote">${m.catatan}</span>`:''}</div>
        ${k?`<div class="bst d">✅ Keluar ${fTgl(k.tanggalKeluar)} · ${fKg(k.jumlahKg)}</div>`:`<div class="bst p">⏳ Masih di gudang</div><button class="bdel" onclick="window._dM('${m.id}')">Hapus</button>`}
        </div>`; }).join('')}
    `;
    document.getElementById('btn-am').onclick=async()=>{
      const pid=document.getElementById('smp').value, tgl=document.getElementById('imt').value,
            kg=parseFloat(document.getElementById('imk').value), cat=document.getElementById('imn').value.trim();

      document.getElementById('imk').value=''; document.getElementById('imn').value=''; document.getElementById('smp').value='';

    };

  window._dM=async id=>{ if(!confirm('Hapus data ini?')) return; await deleteDoc(doc(db,'masuk',id)); toast('Dihapus'); };

  /* ══════════════ KELUAR ══════════════ */
  function rKeluar(){
    const bk=allM.filter(m=>!getK(m.id));
    document.getElementById('content').innerHTML=`
      <div class="ph"><div class="ph-icon">⬆️</div><div><div class="ph-title">Keluar Gudang</div><div class="ph-sub">Catat pengiriman ke konsumen</div></div></div>

        <label class="lbl">Pilih Batch (panen yang dikirim)</label>
        <select id="skb" class="inp"><option value="">-- Pilih Batch --</option>${bk.map(m=>`<option value="${m.id}">${getPtN(m.peternakId)} · ${fTgl(m.tanggalMasuk)} · ${fKg(m.jumlahKg)}</option>`).join('')}</select>
        <label class="lbl">Tanggal Keluar</label><input id="ikt" class="inp" type="date" value="${todayISO()}"/>

        <label class="lbl">Catatan (opsional)</label><input id="ikn" class="inp" type="text" placeholder="Catatan pengiriman..."/>

        <div class="card bc done"><div class="bt"><span class="ptb">${getPtN(m.peternakId)}</span><span class="tgt">${fTgl(m.tanggalMasuk)} → ${fTgl(k.tanggalKeluar)}</span></div>
        <div class="brow"><div class="ri"><div class="ri-l">Masuk</div><div class="ri-v">${fKg(m.jumlahKg)}</div></div><div class="asep">→</div>
        <div class="ri"><div class="ri-l">Keluar</div><div class="ri-v">${fKg(k.jumlahKg)}</div></div>
        <div class="schip ${sel>=0?'pl':'mn'}">${sel>=0?'▲':'▼'} ${fKg(Math.abs(sel))}<span class="pct"> (${pct}%)</span></div></div>
        ${k.catatan?`<div class="bnote" style="margin-top:4px">${k.catatan}</div>`:''}</div>`; }).join('')}
    `;
    const upd=()=>{
      const bid=document.getElementById('skb').value, kg=parseFloat(document.getElementById('ikk').value), el=document.getElementById('sprv');
      if(bid&&kg>0){ const m=allM.find(x=>x.id===bid); if(m){ const s=kg-(parseFloat(m.jumlahKg)||0); const p=m.jumlahKg>0?((s/m.jumlahKg)*100).toFixed(1):0; el.className=`sprev ${s>=0?'pos':'neg'}`; el.innerHTML=`${s>=0?'📈 Bertambah':'📉 Menyusut'} <strong>${fKg(Math.abs(s))}</strong> (${p}%)`; } }
      else{ el.className='sprev'; el.innerHTML=''; }
    };
    document.getElementById('skb').onchange=upd; document.getElementById('ikk').oninput=upd;
    document.getElementById('btn-ak').onclick=async()=>{
      const mid=document.getElementById('skb').value, tgl=document.getElementById('ikt').value,
            kg=parseFloat(document.getElementById('ikk').value), cat=document.getElementById('ikn').value.trim();
      if(!mid) return toast('Pilih batch','err');
      if(!tgl) return toast('Isi tanggal keluar','err');
      if(!kg||kg<=0) return toast('Isi berat yang valid','err');
      const m=allM.find(x=>x.id===mid);
      await addDoc(collection(db,'keluar'),{masukId:mid,tanggalKeluar:tgl,jumlahKg:kg,selisih:kg-(parseFloat(m.jumlahKg)||0),catatan:cat,createdAt:serverTimestamp()});
      toast('Pengiriman disimpan ✓');
    };
  }
