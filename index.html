<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>GudangUlat 🐛</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#0e0c09;--bg2:#181410;--bg3:#221d17;--card:#1c1811;
      --border:#3a3020;--border2:#4a3f2f;
      --accent:#c97d30;--accent2:#e09a50;--gold:#edb84a;
      --text:#e8ddd0;--text2:#9e9080;--text3:#6a6050;
      --plus:#00e878;--minus:#ff4444;
      --nav-h:64px;--r:14px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;min-height:100vh;overflow-x:hidden}

    /* ═══════════════════════════
       BOTTONS — SISTEM SERAGAM
       semua hijau elektrik 3D
       kecuali danger = merah
    ═══════════════════════════ */

    /* ── BASE GREEN 3D ── */
    .btn-g{
      display:block;width:100%;
      background:linear-gradient(180deg,#22ff96 0%,#00e070 45%,#00c060 100%);
      border:none;border-radius:13px;
      color:#002018;font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;
      padding:13px 16px;cursor:pointer;letter-spacing:.025em;
      text-shadow:0 1px 1px rgba(255,255,255,.3);
      box-shadow:
        0 1px 0 rgba(255,255,255,.35) inset,
        0 -2px 0 rgba(0,0,0,.25) inset,
        0 4px 0 #006030,
        0 7px 18px rgba(0,220,100,.4);
      transition:transform .1s,box-shadow .1s;
      -webkit-appearance:none;
      margin-top:14px;
    }
    .btn-g:active{
      transform:translateY(4px);
      box-shadow:
        0 1px 0 rgba(255,255,255,.35) inset,
        0 -2px 0 rgba(0,0,0,.25) inset,
        0 0px 0 #006030,
        0 2px 8px rgba(0,220,100,.25);
    }
    /* size variants */
    .btn-g.sm{
      width:auto;padding:8px 18px;font-size:.82rem;
      margin-top:0;border-radius:10px;
      box-shadow:
        0 1px 0 rgba(255,255,255,.35) inset,
        0 -2px 0 rgba(0,0,0,.25) inset,
        0 3px 0 #006030,
        0 5px 12px rgba(0,220,100,.35);
    }
    .btn-g.sm:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(255,255,255,.35) inset,0 -2px 0 rgba(0,0,0,.25) inset,0 0 0 #006030,0 1px 5px rgba(0,220,100,.2)}

    /* ── DANGER RED 3D (hapus + logout) ── */
    .btn-r{
      display:inline-flex;align-items:center;justify-content:center;gap:5px;
      background:linear-gradient(180deg,#ff5555 0%,#e52020 50%,#c01010 100%);
      border:none;border-radius:10px;
      color:#fff;font-family:'Syne',sans-serif;font-weight:800;font-size:.82rem;
      padding:8px 18px;cursor:pointer;letter-spacing:.02em;
      text-shadow:0 1px 2px rgba(0,0,0,.4);
      box-shadow:
        0 1px 0 rgba(255,255,255,.3) inset,
        0 -2px 0 rgba(0,0,0,.3) inset,
        0 4px 0 #880000,
        0 6px 14px rgba(200,0,0,.5);
      transition:transform .1s,box-shadow .1s;
      -webkit-appearance:none;
    }
    .btn-r:active{
      transform:translateY(4px);
      box-shadow:0 1px 0 rgba(255,255,255,.3) inset,0 -2px 0 rgba(0,0,0,.3) inset,0 0 0 #880000,0 2px 6px rgba(200,0,0,.3);
    }
    /* wide variant for full-width */
    .btn-r.wide{display:block;width:100%;margin-top:14px;padding:13px 16px;font-size:.95rem;border-radius:13px;
      box-shadow:0 1px 0 rgba(255,255,255,.3) inset,0 -2px 0 rgba(0,0,0,.3) inset,0 4px 0 #880000,0 7px 18px rgba(200,0,0,.45);
    }
    .btn-r.wide:active{transform:translateY(4px);box-shadow:0 1px 0 rgba(255,255,255,.3) inset,0 -2px 0 rgba(0,0,0,.3) inset,0 0 0 #880000,0 2px 8px rgba(200,0,0,.25)}

    /* ── TOPBAR LOGOUT — red pill ── */
    #btn-logout{
      background:linear-gradient(180deg,#ff5555,#cc1010);
      border:none;color:#fff;font-size:.72rem;font-weight:800;
      padding:6px 14px;border-radius:20px;cursor:pointer;
      font-family:'Syne',sans-serif;letter-spacing:.02em;
      box-shadow:0 1px 0 rgba(255,255,255,.25) inset,0 3px 0 #770000,0 4px 10px rgba(180,0,0,.5);
      transition:transform .1s,box-shadow .1s;
    }
    #btn-logout:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(255,255,255,.25) inset,0 0 0 #770000,0 1px 5px rgba(180,0,0,.3)}

    /* ── INFO SUB-TABS ── */
    .tabb{
      flex:1;padding:10px 4px;border-radius:11px;
      background:#1e1a14;
      border:1.5px solid #3a3020;
      color:#7a7060;font-family:'Syne',sans-serif;
      font-weight:700;font-size:.74rem;cursor:pointer;
      transition:all .15s;-webkit-appearance:none;
    }
    .tabb.active{
      background:linear-gradient(180deg,#22ff96 0%,#00e070 45%,#00c060 100%);
      color:#002018;border-color:transparent;
      box-shadow:0 1px 0 rgba(255,255,255,.35) inset,0 3px 0 #006030,0 5px 14px rgba(0,220,100,.45);
      text-shadow:0 1px 1px rgba(255,255,255,.3);
    }

    /* ── DEV LINK BUTTONS ── */
    .dlb{
      display:flex;align-items:center;justify-content:center;gap:8px;
      padding:12px 16px;border-radius:12px;font-size:.85rem;font-weight:700;
      text-decoration:none;cursor:pointer;
      font-family:'Syne',sans-serif;width:100%;margin-bottom:9px;
      -webkit-appearance:none;transition:transform .1s,box-shadow .1s;
    }
    .dlb:active{transform:translateY(3px)}
    /* WA → green electric */
    .bwa{
      background:linear-gradient(180deg,#22ff96,#00c060);
      color:#002018;border:none;
      box-shadow:0 1px 0 rgba(255,255,255,.35) inset,0 3px 0 #006030,0 5px 14px rgba(0,200,90,.4);
    }
    .bwa:active{box-shadow:0 1px 0 rgba(255,255,255,.35) inset,0 0 0 #006030,0 2px 6px rgba(0,200,90,.2)}
    /* DANA → electric blue */
    .bdana{
      background:linear-gradient(180deg,#55aaff,#0070e0);
      color:#fff;border:none;
      box-shadow:0 1px 0 rgba(255,255,255,.35) inset,0 3px 0 #003880,0 5px 14px rgba(0,100,220,.4);
      text-shadow:0 1px 2px rgba(0,0,0,.3);
    }
    .bdana:active{box-shadow:0 1px 0 rgba(255,255,255,.35) inset,0 0 0 #003880,0 2px 6px rgba(0,100,220,.2)}

    /* ═══════════════ BASE LAYOUT ═══════════════ */
    .screen{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;background:var(--bg);overflow-y:auto}
    .screen.hidden{display:none!important}
    #login-screen{background:radial-gradient(ellipse at 50% -10%,#3a2010 0%,var(--bg) 60%)}
    .login-logo{font-size:4rem;margin-bottom:6px;animation:pulse 3s ease-in-out infinite}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
    .login-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:2.2rem;color:var(--accent2);letter-spacing:-1px}
    .login-tagline{color:var(--text3);font-size:.8rem;margin-bottom:32px;text-align:center;line-height:1.4}
    .login-box{width:100%;max-width:360px;background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:24px 22px}
    .login-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:var(--accent2);margin-bottom:16px;text-align:center}
    .login-footer-dev{margin-top:24px;text-align:center;font-size:.7rem;color:var(--text3);line-height:1.6}
    .login-footer-dev a{color:var(--accent2);text-decoration:none;font-weight:500}

    #app{position:relative;z-index:1;padding-bottom:calc(var(--nav-h)+20px);min-height:100vh;display:none}
    #content{padding:0 16px 16px;max-width:500px;margin:0 auto}

    #topbar-wrap{position:sticky;top:0;z-index:30;background:rgba(14,12,9,.95);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
    #topbar{max-width:500px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
    .topbar-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:var(--accent2);display:flex;align-items:center;gap:7px}

    .ph{display:flex;align-items:center;gap:12px;padding:18px 0 14px}
    .ph-icon{font-size:2rem;line-height:1}
    .ph-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;color:var(--accent2);letter-spacing:-.5px}
    .ph-sub{font-size:.78rem;color:var(--text3);margin-top:2px}

    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}

    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
    .sc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:4px}
    .sc.accent{border-color:var(--accent);background:linear-gradient(135deg,#2c1f0e,#1c1811)}
    .sc.pos{border-color:#006030;background:linear-gradient(135deg,#062010,#1c1811)}
    .sc.neg{border-color:#880000;background:linear-gradient(135deg,#220808,#1c1811)}
    .sc-icon{font-size:1.3rem}
    .sc-val{font-family:'Syne',sans-serif;font-weight:700;font-size:1.2rem;color:var(--accent2)}
    .sc-lbl{font-size:.72rem;color:var(--text2)}
    .sc-badge{font-size:.68rem;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:20px;display:inline-block;margin-top:2px}

    .sl{font-family:'Syne',sans-serif;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin:16px 0 8px;font-weight:600}

    .bc{border-left:3px solid var(--accent)}
    .bc.done{border-left-color:var(--text3);opacity:.8}
    .bt{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px}
    .ptb{background:rgba(201,125,48,.15);border:1px solid rgba(201,125,48,.35);color:var(--accent2);font-size:.78rem;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:58%}
    .tgt{font-size:.72rem;color:var(--text3);white-space:nowrap}
    .bb{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:6px}
    .bkg{font-size:.88rem;color:var(--text)}.bkg strong{color:var(--gold);font-size:.95rem}
    .bnote{font-size:.73rem;color:var(--text3);font-style:italic}
    .bst{font-size:.74rem;padding:3px 0;font-weight:500}
    .bst.p{color:var(--accent2)}.bst.d{color:var(--plus)}
    .brow{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:8px 0}
    .ri{text-align:center}
    .ri-l{font-size:.64rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
    .ri-v{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;color:var(--text)}
    .asep{color:var(--text3);font-size:1rem}
    .schip{font-size:.82rem;font-weight:600;padding:5px 12px;border-radius:20px;margin-left:auto}
    .schip.pl{background:rgba(0,232,120,.12);border:1px solid rgba(0,232,120,.4);color:var(--plus)}
    .schip.mn{background:rgba(255,68,68,.12);border:1px solid rgba(255,68,68,.4);color:var(--minus)}
    .schip .pct{font-weight:400;font-size:.72rem;opacity:.8}

    .fc{margin-bottom:20px}
    .ft{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;color:var(--accent2);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
    .lbl{display:block;font-size:.7rem;color:var(--text2);margin-bottom:4px;margin-top:12px;text-transform:uppercase;letter-spacing:.06em;font-weight:500}
    .inp{width:100%;background:var(--bg2);border:1.5px solid var(--border2);color:var(--text);border-radius:10px;padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:.93rem;transition:border-color .2s,background .2s;-webkit-appearance:none}
    .inp:focus{outline:none;border-color:#00c060;background:#141e14}
    .inp::placeholder{color:var(--text3)}
    .inp option{background:var(--bg2)}

    .sprev{margin-top:12px;padding:11px 16px;border-radius:10px;font-size:.88rem;text-align:center;display:none;font-weight:600}
    .sprev.pos{background:#003d18;border:2px solid #00cc66;color:#00ff88;display:block;box-shadow:0 0 16px rgba(0,200,100,.2)}
    .sprev.neg{background:#3d0808;border:2px solid #cc2020;color:#ff6060;display:block;box-shadow:0 0 16px rgba(200,30,30,.2)}

    .ptr{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .pti{display:flex;align-items:center;gap:12px}
    .ptav{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0e0c09;font-family:'Syne',sans-serif;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
    .ptn{font-weight:600;font-size:.93rem;color:var(--text)}
    .ptm{font-size:.72rem;color:var(--text3);margin-top:2px}

    .empty{text-align:center;color:var(--text3);padding:32px 16px;font-size:.88rem;border:1.5px dashed var(--border2);border-radius:var(--r);margin-bottom:10px}

    /* ═══════════════ BOTTOM NAV ═══════════════
       Tidak ada glow/menyala saat aktif
       Hanya tanda titik kecil + teks lebih terang
    ════════════════════════════════════════════ */
    #nav{
      position:fixed;bottom:0;left:0;right:0;z-index:40;
      height:var(--nav-h);
      background:rgba(8,7,5,.98);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-top:1.5px solid #2a2218;
      display:flex;align-items:stretch;
      padding-bottom:env(safe-area-inset-bottom,0px);
    }
    .nb{
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
      background:none;border:none;cursor:pointer;
      padding:6px 2px 8px;
      color:#3a3020;font-family:'DM Sans',sans-serif;font-size:.58rem;font-weight:600;
      transition:color .18s;flex:1;min-width:0;letter-spacing:.02em;
      position:relative;
    }
    .ni{font-size:1.2rem;line-height:1;display:block;transition:transform .18s}
    /* active — teks & ikon lebih terang + garis bawah kecil, NO glow */
    .nb.active{color:var(--accent2)}
    .nb.active .ni{transform:scale(1.12)}
    .nb.active::after{
      content:'';position:absolute;bottom:4px;left:50%;
      transform:translateX(-50%);
      width:18px;height:2.5px;border-radius:2px;
      background:var(--accent2);
    }

    #toast{position:fixed;bottom:calc(var(--nav-h)+14px);left:50%;transform:translateX(-50%);background:#1e1a12;border:1.5px solid var(--border2);color:var(--text);padding:10px 22px;border-radius:30px;font-size:.83rem;z-index:200;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.6);pointer-events:none;opacity:0;transition:opacity .25s}
    #toast.show{opacity:1}
    #toast.ok{border-color:rgba(0,232,120,.5);color:var(--plus)}
    #toast.err{border-color:rgba(255,68,68,.5);color:var(--minus)}

    /* ─── INFO TABS ROW ─── */
    .tab-row{display:flex;gap:8px;margin-bottom:16px}

    /* ─── PANDUAN ─── */
    .gs{display:flex;gap:14px;margin-bottom:16px}
    .gsn{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0e0c09;font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
    .gsb .gst{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;color:var(--accent2);margin-bottom:5px}
    .gsb p{font-size:.82rem;color:var(--text2);line-height:1.55}
    .gstip{font-size:.77rem;color:var(--text3);background:rgba(201,125,48,.08);padding:7px 10px;border-radius:8px;margin-top:6px;border-left:2px solid var(--accent)}

    /* ─── ABOUT / DEV ─── */
    .fi{display:flex;align-items:flex-start;gap:10px;font-size:.83rem;color:var(--text2);margin-bottom:10px}
    .ficon{font-size:1.1rem;flex-shrink:0;margin-top:1px}
    .devc{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:18px;text-align:center}
    .devav{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0e0c09;font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
    .devn{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:var(--accent2)}
    .devr{font-size:.75rem;color:var(--text3);margin-top:3px;margin-bottom:16px}
    .dno{font-size:.73rem;color:var(--text3);text-align:center;margin-top:6px;line-height:1.5}
    .cmsg{background:linear-gradient(135deg,#1e1608,#120f07);border:1px solid #3a2d10;border-radius:var(--r);padding:18px;margin-top:12px;text-align:center}
    .cmsg p{font-size:.83rem;color:var(--text2);line-height:1.7}
    .csign{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;color:var(--gold);margin-top:10px}

    /* ─── SETTINGS ─── */
    .sec-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:.12em;margin-bottom:12px}
    .sr{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
    .sr:last-child{border-bottom:none}
    .sl2{font-size:.88rem;color:var(--text);font-weight:500}
    .ssub{font-size:.72rem;color:var(--text3);margin-top:2px}
    .cpf{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-top:12px;display:none}
    .cpf.open{display:block}

    /* ─── LAPORAN ─── */
    .lap-filter{display:flex;gap:8px;margin-bottom:16px}
    .lap-filter .inp{margin-top:0}
    .lap-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
    .ls{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
    .ls-val{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;margin-top:4px}
    .ls-lbl{font-size:.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
    .ls.green{border-color:#006030;background:linear-gradient(135deg,#061a0e,#1c1811)}
    .ls.green .ls-val{color:var(--plus)}
    .ls.red{border-color:#660000;background:linear-gradient(135deg,#1a0606,#1c1811)}
    .ls.red .ls-val{color:var(--minus)}
    .ls.gold{border-color:var(--accent);background:linear-gradient(135deg,#2c1f0e,#1c1811)}
    .ls.gold .ls-val{color:var(--gold)}
    .ls.blue{border-color:#003880;background:linear-gradient(135deg,#060c1a,#1c1811)}
    .ls.blue .ls-val{color:#70aaff}
    .pt-section{margin-bottom:16px}
    .pt-section-header{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;margin-bottom:8px}
    .pt-section-av{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0e0c09;font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .pt-section-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;color:var(--accent2)}
    .pt-section-meta{font-size:.72rem;color:var(--text3);margin-top:1px}
    .lap-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:6px;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px;font-size:.8rem}
    .lap-row .lr-tgl{color:var(--text3);font-size:.72rem}
    .lap-row .lr-masuk{color:var(--text)}
    .lap-row .lr-keluar{color:var(--text)}
    .lap-row .lr-sel{font-weight:700;font-size:.78rem;text-align:right}
    .lap-row .lr-sel.p{color:var(--plus)}.lap-row .lr-sel.n{color:var(--minus)}.lap-row .lr-sel.pending{color:var(--accent2)}
    .lap-no-data{text-align:center;color:var(--text3);padding:40px 16px;font-size:.88rem;border:1.5px dashed var(--border2);border-radius:var(--r)}

    /* ─── FOOTER ─── */
    #app-footer{text-align:center;padding:20px 16px 8px;border-top:1px solid var(--border);max-width:500px;margin:0 auto}
  </style>
</head>
<body>

<!-- ════════════ LOGIN ════════════ -->
<div id="login-screen" class="screen">
  <div class="login-logo">🐛</div>
  <div class="login-brand">GudangUlat</div>
  <div class="login-tagline">Manajemen Stok Ulat Hongkong</div>
  <div class="login-box">
    <div id="ltitle" class="login-title">Masuk ke Aplikasi</div>
    <div id="f-login">
      <label class="lbl">Password</label>
      <input id="ip" class="inp" type="password" placeholder="Masukkan password..." autocomplete="current-password"/>
      <button class="btn-g" id="btn-login">🔓 Masuk</button>
      <div id="lerr" style="display:none;color:var(--minus);font-size:.8rem;text-align:center;margin-top:12px;background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);border-radius:8px;padding:8px">
        ❌ Password salah. Coba lagi.
      </div>

        Selamat datang! Buat password untuk melindungi aplikasi ini.
      </p>
      <label class="lbl">Password Baru</label>
      <input id="is1" class="inp" type="password" placeholder="Minimal 4 karakter..."/>
      <label class="lbl">Ulangi Password</label>
      <input id="is2" class="inp" type="password" placeholder="Ulangi password..."/>
      <button class="btn-g" id="btn-setup">✅ Simpan &amp; Masuk</button>
      <div id="serr" style="display:none;color:var(--minus);font-size:.8rem;text-align:center;margin-top:10px;background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);border-radius:8px;padding:8px"></div>
    </div>
  </div>
  <div class="login-footer-dev">Dibuat oleh <a href="https://wa.me/+6288991568151" target="_blank">Bayu Satrio</a> · © 2025</div>
</div>

<!-- ════════════ APP ════════════ -->
<div id="app">
  <div id="topbar-wrap">
    <div id="topbar">
      <div class="topbar-brand"><span>🐛</span> GudangUlat</div>
      <button id="btn-logout">Keluar</button>
    </div>
  </div>
  <div id="content"></div>
  <div id="app-footer">
    <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;color:var(--accent)">🐛 GudangUlat</div>
    <div style="font-size:.67rem;color:var(--text3);margin-top:3px">© 2025 Bayu Satrio · All rights reserved</div>
  </div>
</div>

<!-- ════════════ BOTTOM NAV (6 items) ════════════ -->
<nav id="nav" style="display:none">
  <button class="nb" data-page="dashboard"><span class="ni">🏠</span><span>Beranda</span></button>
  <button class="nb" data-page="masuk"><span class="ni">⬇️</span><span>Masuk</span></button>
  <button class="nb" data-page="keluar"><span class="ni">⬆️</span><span>Keluar</span></button>
  <button class="nb" data-page="peternak"><span class="ni">👨‍🌾</span><span>Peternak</span></button>
  <button class="nb" data-page="laporan"><span class="ni">📊</span><span>Laporan</span></button>
  <button class="nb" data-page="info"><span class="ni">⚙️</span><span>Info</span></button>
</nav>

<div id="toast"></div>

<!-- ════════════ SCRIPT ════════════ -->
<script type="module">
  import { firebaseConfig }   from './firebase-config.js';
  import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, doc, deleteDoc, query, orderBy, onSnapshot, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, signInAnonymously, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const fbApp = initializeApp(firebaseConfig);
  const db    = getFirestore(fbApp);
  const auth  = getAuth(fbApp);

  const KP='gu_pw', KS='gu_sess', KPG='gu_page';
  const TTL=7*864e5;

  let curPage='dashboard', infoTab='panduan';
  let lapBulan='', lapTahun='';
  let allPt=[], allM=[], allK=[];

  /* ── Hash ── */
  function h(s){let r=5381;for(let i=0;i<s.length;i++)r=((r<<5)+r)^s.charCodeAt(i);return(r>>>0).toString(36);}

  /* ── Session ── */
  const sessOK   =()=>{const s=localStorage.getItem(KS);return !!s&&Date.now()-+s<TTL;};
  const saveSess =()=>localStorage.setItem(KS,String(Date.now()));
  const clearSess=()=>localStorage.removeItem(KS);
  const getPW    =()=>localStorage.getItem(KP);

  /* ════════ LOGIN ════════ */
  function initLogin(){
    if(!getPW()){
      document.getElementById('ltitle').textContent='Buat Password';
      document.getElementById('f-login').style.display='none';
      document.getElementById('f-setup').style.display='block';
    }
    document.getElementById('btn-login').onclick=()=>{
      const v=document.getElementById('ip').value;
      if(!v)return;
      if(h(v)===getPW()){saveSess();bootApp();}
      else{document.getElementById('lerr').style.display='block';document.getElementById('ip').value='';document.getElementById('ip').focus();}
    };
    document.getElementById('ip').onkeydown=e=>{if(e.key==='Enter')document.getElementById('btn-login').click();};
    document.getElementById('btn-setup').onclick=()=>{
      const p1=document.getElementById('is1').value, p2=document.getElementById('is2').value;
      const er=document.getElementById('serr');
      if(p1.length<4){er.textContent='❌ Minimal 4 karakter.';er.style.display='block';return;}
      if(p1!==p2){er.textContent='❌ Password tidak cocok.';er.style.display='block';return;}
      localStorage.setItem(KP,h(p1));saveSess();bootApp();
    };
    ['is1','is2'].forEach(id=>{document.getElementById(id).onkeydown=e=>{if(e.key==='Enter')document.getElementById('btn-setup').click();};});
  }

  document.getElementById('btn-logout').onclick=()=>{
    if(!confirm('Keluar dari aplikasi?'))return;
    clearSess();
    document.getElementById('app').style.display='none';
    document.getElementById('nav').style.display='none';
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('ip').value='';
    document.getElementById('lerr').style.display='none';
  };

  /* ════════ BOOT ════════ */
  function bootApp(){
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').style.display='block';
    document.getElementById('nav').style.display='flex';
    signInAnonymously(auth).catch(e=>toast('Firebase error: '+e.code,'err'));
    onAuthStateChanged(auth,u=>{if(u)startRT();});
    nav(localStorage.getItem(KPG)||'dashboard',false);
  }

  /* ════════ REALTIME ════════ */
  let rtOn=false;
  function startRT(){
    if(rtOn)return;rtOn=true;
    onSnapshot(query(collection(db,'peternak'),orderBy('nama')),s=>{allPt=s.docs.map(d=>({id:d.id,...d.data()}));renderNow();});
    onSnapshot(query(collection(db,'masuk'),orderBy('tanggalMasuk','desc')),s=>{allM=s.docs.map(d=>({id:d.id,...d.data()}));renderNow();});
    onSnapshot(query(collection(db,'keluar'),orderBy('tanggalKeluar','desc')),s=>{allK=s.docs.map(d=>({id:d.id,...d.data()}));renderNow();});
  }

  function renderNow(){
    if(curPage==='dashboard')  rDash();
    else if(curPage==='masuk')    rMasuk();
    else if(curPage==='keluar')   rKeluar();
    else if(curPage==='peternak') rPt();
    else if(curPage==='laporan')  rLaporan();
    else if(curPage==='info')     rInfo();
  }

  /* ════════ HELPERS ════════ */
  const fTgl=s=>!s?'-':new Date(s).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
  const fKg =v=>{const n=parseFloat(v)||0;return n>=100?(n/100).toFixed(2)+' kw':n.toFixed(1)+' kg';};
  const fPct=(a,b)=>b>0?((a/b)*100).toFixed(1)+'%':'0%';
  const getK=mid=>allK.find(k=>k.masukId===mid)||null;
  const getPtN=id=>{const p=allPt.find(p=>p.id===id);return p?p.nama:id;};
  const today=()=>new Date().toISOString().slice(0,10);
  const nowY =()=>String(new Date().getFullYear());
  const nowM =()=>String(new Date().getMonth()+1).padStart(2,'0');

  /* ════════ NAVIGATE ════════ */
  function nav(p,save=true){
    curPage=p;
    if(save)localStorage.setItem(KPG,p);
    document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('active',b.dataset.page===p));
    renderNow();
    window.scrollTo(0,0);
  }

  /* ════════ DASHBOARD ════════ */
  function rDash(){
    const dg=allM.filter(m=>!getK(m.id));
    const sl=allM.filter(m=>getK(m.id));
    const skKg=dg.reduce((s,m)=>s+(parseFloat(m.jumlahKg)||0),0);
    const tmKg=allM.reduce((s,m)=>s+(parseFloat(m.jumlahKg)||0),0);
    const tkKg=allK.reduce((s,k)=>s+(parseFloat(k.jumlahKg)||0),0);
    const tSel=sl.reduce((s,m)=>{const k=getK(m.id);return s+((parseFloat(k.jumlahKg)||0)-(parseFloat(m.jumlahKg)||0));},0);
    document.getElementById('content').innerHTML=`
      <div class="ph"><div class="ph-icon">🏭</div><div><div class="ph-title">Dashboard</div><div class="ph-sub">Ringkasan stok gudang</div></div></div>
      <div class="stat-grid">
        <div class="sc accent"><div class="sc-icon">📦</div><div class="sc-val">${fKg(skKg)}</div><div class="sc-lbl">Stok di Gudang</div><div class="sc-badge">${dg.length} batch aktif</div></div>
        <div class="sc ${tSel>=0?'pos':'neg'}"><div class="sc-icon">${tSel>=0?'📈':'📉'}</div><div class="sc-val">${tSel>=0?'+':''}${fKg(tSel)}</div><div class="sc-lbl">Selisih Total</div><div class="sc-badge">${sl.length} selesai</div></div>
        <div class="sc"><div class="sc-icon">⬇️</div><div class="sc-val">${fKg(tmKg)}</div><div class="sc-lbl">Total Masuk</div></div>
        <div class="sc"><div class="sc-icon">⬆️</div><div class="sc-val">${fKg(tkKg)}</div><div class="sc-lbl">Total Keluar</div></div>
      </div>
      <div class="sl">Batch Aktif (${dg.length})</div>
      ${dg.length===0?'<div class="empty">Gudang kosong 🏭</div>':''}
      ${dg.map(m=>`
        <div class="card bc">
          <div class="bt"><span class="ptb">${getPtN(m.peternakId)}</span><span class="tgt">${fTgl(m.tanggalMasuk)}</span></div>
          <div class="bb"><span class="bkg">Masuk: <strong>${fKg(m.jumlahKg)}</strong></span>${m.catatan?`<span class="bnote">${m.catatan}</span>`:''}</div>
          <div class="bst p">⏳ Menunggu penimbangan keluar</div>
        </div>`).join('')}
      <div class="sl" style="margin-top:18px">Riwayat Terakhir</div>
      ${sl.length===0?'<div class="empty">Belum ada yang selesai</div>':''}
      ${sl.slice(0,5).map(m=>{
        const k=getK(m.id);const sel=(parseFloat(k.jumlahKg)||0)-(parseFloat(m.jumlahKg)||0);
        return `<div class="card bc done">
          <div class="bt"><span class="ptb">${getPtN(m.peternakId)}</span><span class="tgt">${fTgl(m.tanggalMasuk)} → ${fTgl(k.tanggalKeluar)}</span></div>
          <div class="brow">
            <div class="ri"><div class="ri-l">Masuk</div><div class="ri-v">${fKg(m.jumlahKg)}</div></div>
            <div class="asep">→</div>
            <div class="ri"><div class="ri-l">Keluar</div><div class="ri-v">${fKg(k.jumlahKg)}</div></div>
            <div class="schip ${sel>=0?'pl':'mn'}">${sel>=0?'▲':'▼'} ${fKg(Math.abs(sel))}<span class="pct"> (${fPct(Math.abs(sel),m.jumlahKg)})</span></div>
          </div>
        </div>`;}).join('')}
    `;
  }

  /* ════════ PETERNAK ════════ */
  function rPt(){
    document.getElementById('content').innerHTML=`
      <div class="ph"><div class="ph-icon">👨‍🌾</div><div><div class="ph-title">Peternak</div><div class="ph-sub">Kelola daftar peternak</div></div></div>
      <div class="card fc">
        <div class="ft">Tambah Peternak Baru</div>
        <label class="lbl">Nama Peternak</label>
        <input id="iptn" class="inp" type="text" placeholder="Contoh: Naja, Pak Budi..." maxlength="50"/>
        <button class="btn-g" id="btn-apt">+ Tambah Peternak</button>
      </div>
      <div class="sl">${allPt.length} Peternak Terdaftar</div>
      ${allPt.length===0?'<div class="empty">Belum ada peternak 👨‍🌾</div>':''}
      ${allPt.map(p=>{
        const bs=allM.filter(m=>m.peternakId===p.id);
        const ak=bs.filter(m=>!getK(m.id)).length;
        return `<div class="card ptr">
          <div class="pti">
            <div class="ptav">${p.nama.charAt(0).toUpperCase()}</div>
            <div><div class="ptn">${p.nama}</div><div class="ptm">${bs.length} batch · ${ak} aktif</div></div>
          </div>
          <button class="btn-r" onclick="window._dPt('${p.id}','${p.nama.replace(/'/g,"\\'").replace(/"/g,"&quot;")}')">🗑 Hapus</button>
        </div>`;}).join('')}
    `;
    document.getElementById('btn-apt').onclick=async()=>{
      const n=document.getElementById('iptn').value.trim();
      if(!n)return toast('Masukkan nama peternak','err');
      if(allPt.find(p=>p.nama.toLowerCase()===n.toLowerCase()))return toast('Nama sudah terdaftar','err');
      await addDoc(collection(db,'peternak'),{nama:n,createdAt:serverTimestamp()});
      document.getElementById('iptn').value='';toast('Peternak ditambahkan ✓');
    };
    document.getElementById('iptn').onkeydown=e=>{if(e.key==='Enter')document.getElementById('btn-apt').click();};
  }
  window._dPt=async(id,n)=>{
    if(allM.find(m=>m.peternakId===id))return toast('Tidak bisa hapus: ada data masuk','err');
    if(!confirm(`Hapus peternak "${n}"?`))return;
    await deleteDoc(doc(db,'peternak',id));toast('Dihapus');
  };

  /* ════════ MASUK ════════ */
  function rMasuk(){
    document.getElementById('content').innerHTML=`
      <div class="ph"><div class="ph-icon">⬇️</div><div><div class="ph-title">Masuk Gudang</div><div class="ph-sub">Catat panenan masuk dari peternak</div></div></div>
      <div class="card fc">
        <div class="ft">Catat Panen Masuk</div>
        <label class="lbl">Peternak</label>
        <select id="smp" class="inp"><option value="">-- Pilih Peternak --</option>${allPt.map(p=>`<option value="${p.id}">${p.nama}</option>`).join('')}</select>
        <label class="lbl">Tanggal Masuk</label>
        <input id="imt" class="inp" type="date" value="${today()}"/>
        <label class="lbl">Berat Masuk (kg)</label>
        <input id="imk" class="inp" type="number" min="0.1" step="0.1" placeholder="Contoh: 100"/>
        <label class="lbl">Catatan (opsional)</label>
        <input id="imn" class="inp" type="text" placeholder="Catatan tambahan..."/>
        <button class="btn-g" id="btn-am">⬇️ Simpan Masuk Gudang</button>
      </div>
      <div class="sl">Semua Data Masuk (${allM.length})</div>
      ${allM.length===0?'<div class="empty">Belum ada data masuk</div>':''}
      ${allM.map(m=>{const k=getK(m.id);return `
        <div class="card bc ${k?'done':''}">
          <div class="bt"><span class="ptb">${getPtN(m.peternakId)}</span><span class="tgt">${fTgl(m.tanggalMasuk)}</span></div>
          <div class="bb"><span class="bkg">Masuk: <strong>${fKg(m.jumlahKg)}</strong></span>${m.catatan?`<span class="bnote">${m.catatan}</span>`:''}</div>
          ${k?`<div class="bst d">✅ Keluar ${fTgl(k.tanggalKeluar)} · ${fKg(k.jumlahKg)}</div>`
             :`<div class="bst p">⏳ Masih di gudang</div>
               <button class="btn-r" style="margin-top:6px;padding:5px 14px;font-size:.74rem" onclick="window._dM('${m.id}')">🗑 Hapus</button>`}
        </div>`;}).join('')}
    `;
    document.getElementById('btn-am').onclick=async()=>{
      const pid=document.getElementById('smp').value, tgl=document.getElementById('imt').value;
      const kg=parseFloat(document.getElementById('imk').value), cat=document.getElementById('imn').value.trim();
      if(!pid)return toast('Pilih peternak dulu','err');
      if(!tgl)return toast('Isi tanggal masuk','err');
      if(!kg||kg<=0)return toast('Isi berat yang valid','err');
      await addDoc(collection(db,'masuk'),{peternakId:pid,tanggalMasuk:tgl,jumlahKg:kg,catatan:cat,createdAt:serverTimestamp()});
      document.getElementById('smp').value='';document.getElementById('imk').value='';document.getElementById('imn').value='';
      toast('Data masuk disimpan ✓');
    };
  }
  window._dM=async id=>{if(!confirm('Hapus data masuk ini?'))return;await deleteDoc(doc(db,'masuk',id));toast('Dihapus');};

  /* ════════ KELUAR ════════ */
  function rKeluar(){
    const bk=allM.filter(m=>!getK(m.id));
    document.getElementById('content').innerHTML=`
      <div class="ph"><div class="ph-icon">⬆️</div><div><div class="ph-title">Keluar Gudang</div><div class="ph-sub">Catat penimbangan &amp; pengiriman</div></div></div>
      <div class="card fc">
        <div class="ft">Catat Pengiriman Keluar</div>
        <label class="lbl">Pilih Batch (panen yang dikirim)</label>
        <select id="skb" class="inp"><option value="">-- Pilih Batch --</option>${bk.map(m=>`<option value="${m.id}">${getPtN(m.peternakId)} · ${fTgl(m.tanggalMasuk)} · ${fKg(m.jumlahKg)}</option>`).join('')}</select>
        <label class="lbl">Tanggal Keluar / Kirim</label>
        <input id="ikt" class="inp" type="date" value="${today()}"/>
        <label class="lbl">Berat Keluar (kg) — timbang sekarang</label>
        <input id="ikk" class="inp" type="number" min="0.1" step="0.1" placeholder="Hasil timbang..."/>
        <div id="sprv" class="sprev"></div>
        <label class="lbl">Catatan (opsional)</label>
        <input id="ikn" class="inp" type="text" placeholder="Catatan pengiriman..."/>
        <button class="btn-g" id="btn-ak">✈️ Simpan Pengiriman</button>
      </div>
      <div class="sl">Riwayat Pengiriman (${allK.length})</div>
      ${allK.length===0?'<div class="empty">Belum ada pengiriman tercatat</div>':''}
      ${allK.map(k=>{
        const m=allM.find(x=>x.id===k.masukId);if(!m)return'';
        const sel=(parseFloat(k.jumlahKg)||0)-(parseFloat(m.jumlahKg)||0);
        return `<div class="card bc done">
          <div class="bt"><span class="ptb">${getPtN(m.peternakId)}</span><span class="tgt">${fTgl(m.tanggalMasuk)} → ${fTgl(k.tanggalKeluar)}</span></div>
          <div class="brow">
            <div class="ri"><div class="ri-l">Masuk</div><div class="ri-v">${fKg(m.jumlahKg)}</div></div>
            <div class="asep">→</div>
            <div class="ri"><div class="ri-l">Keluar</div><div class="ri-v">${fKg(k.jumlahKg)}</div></div>
            <div class="schip ${sel>=0?'pl':'mn'}">${sel>=0?'▲':'▼'} ${fKg(Math.abs(sel))}<span class="pct"> (${fPct(Math.abs(sel),m.jumlahKg)})</span></div>
          </div>
          ${k.catatan?`<div class="bnote" style="margin-top:4px">${k.catatan}</div>`:''}
        </div>`;}).join('')}
    `;
    const upd=()=>{
      const bid=document.getElementById('skb').value, kg=parseFloat(document.getElementById('ikk').value);
      const el=document.getElementById('sprv');
      if(bid&&kg>0){const m=allM.find(x=>x.id===bid);if(m){const s=kg-(parseFloat(m.jumlahKg)||0);el.className=`sprev ${s>=0?'pos':'neg'}`;el.innerHTML=`${s>=0?'📈 Bertambah':'📉 Menyusut'} <strong>${fKg(Math.abs(s))}</strong> (${fPct(Math.abs(s),m.jumlahKg)})`; }}
      else{el.className='sprev';el.innerHTML='';}
    };
    document.getElementById('skb').onchange=upd;document.getElementById('ikk').oninput=upd;
    document.getElementById('btn-ak').onclick=async()=>{
      const mid=document.getElementById('skb').value, tgl=document.getElementById('ikt').value;
      const kg=parseFloat(document.getElementById('ikk').value), cat=document.getElementById('ikn').value.trim();
      if(!mid)return toast('Pilih batch dulu','err');
      if(!tgl)return toast('Isi tanggal keluar','err');
      if(!kg||kg<=0)return toast('Isi berat yang valid','err');
      const m=allM.find(x=>x.id===mid);
      await addDoc(collection(db,'keluar'),{masukId:mid,tanggalKeluar:tgl,jumlahKg:kg,selisih:kg-(parseFloat(m.jumlahKg)||0),catatan:cat,createdAt:serverTimestamp()});
      toast('Pengiriman disimpan ✓');
    };
  }

  /* ════════════════════════════════════════════
     LAPORAN BULANAN
  ════════════════════════════════════════════ */
  function rLaporan(){
    if(!lapBulan) lapBulan=nowM();
    if(!lapTahun) lapTahun=nowY();

    // Filter batch yg tanggal masuknya dalam bulan/tahun ini
    const ym=`${lapTahun}-${lapBulan}`;
    const batchBulan=allM.filter(m=>m.tanggalMasuk&&m.tanggalMasuk.startsWith(ym));

    // Juga batch yang keluar bulan ini (meski masuknya lain bulan)
    const keluarBulan=allK.filter(k=>k.tanggalKeluar&&k.tanggalKeluar.startsWith(ym));

    // Summary total
    const totalMasukKg=batchBulan.reduce((s,m)=>s+(parseFloat(m.jumlahKg)||0),0);
    const totalKeluarKg=keluarBulan.reduce((s,k)=>s+(parseFloat(k.jumlahKg)||0),0);
    const batchSelesaiBulan=batchBulan.filter(m=>getK(m.id));
    const batchAktifBulan=batchBulan.filter(m=>!getK(m.id));
    const totalSelisih=batchSelesaiBulan.reduce((s,m)=>{const k=getK(m.id);return s+((parseFloat(k.jumlahKg)||0)-(parseFloat(m.jumlahKg)||0));},0);

    // Per-peternak grouping (hanya yang punya batch di bulan ini)
    const ptIds=[...new Set(batchBulan.map(m=>m.peternakId))];

    // Nama bulan
    const namaBulan=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'];
    const nmBln=namaBulan[parseInt(lapBulan)-1]||lapBulan;

    document.getElementById('content').innerHTML=`
      <div class="ph"><div class="ph-icon">📊</div><div><div class="ph-title">Laporan</div><div class="ph-sub">Laporan bulanan detail</div></div></div>

      <!-- Filter -->
      <div class="card" style="margin-bottom:14px">
        <div class="ft">Pilih Periode</div>
        <div style="display:flex;gap:10px">
          <div style="flex:1">
            <label class="lbl">Bulan</label>
            <select id="f-bln" class="inp" style="margin-top:4px">
              ${['01','02','03','04','05','06','07','08','09','10','11','12'].map((b,i)=>
                `<option value="${b}" ${b===lapBulan?'selected':''}>${namaBulan[i]}</option>`).join('')}
            </select>
          </div>
          <div style="flex:1">
            <label class="lbl">Tahun</label>
            <select id="f-thn" class="inp" style="margin-top:4px">
              ${[nowY(),String(+nowY()-1),String(+nowY()-2)].map(y=>
                `<option value="${y}" ${y===lapTahun?'selected':''}>${y}</option>`).join('')}
            </select>
          </div>
        </div>
        <button class="btn-g" id="btn-filter-lap">🔍 Tampilkan Laporan</button>
      </div>

      <!-- Summary cards -->
      <div class="sl">Ringkasan ${nmBln} ${lapTahun}</div>
      <div class="lap-summary">
        <div class="ls gold">
          <div>📦</div>
          <div class="ls-val">${batchBulan.length}</div>
          <div class="ls-lbl">Batch Masuk</div>
        </div>
        <div class="ls blue">
          <div>⬆️</div>
          <div class="ls-val">${keluarBulan.length}</div>
          <div class="ls-lbl">Batch Keluar</div>
        </div>
        <div class="ls green">
          <div>⬇️</div>
          <div class="ls-val">${fKg(totalMasukKg)}</div>
          <div class="ls-lbl">Total Masuk</div>
        </div>
        <div class="ls ${totalSelisih>=0?'green':'red'}">
          <div>${totalSelisih>=0?'📈':'📉'}</div>
          <div class="ls-val">${totalSelisih>=0?'+':''}${fKg(totalSelisih)}</div>
          <div class="ls-lbl">Selisih Bulan</div>
        </div>
      </div>

      <!-- Stats baris kedua -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">
        <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Berat Keluar</div>
          <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;color:#70aaff;margin-top:3px">${fKg(totalKeluarKg)}</div>
        </div>
        <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Selesai</div>
          <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;color:var(--plus);margin-top:3px">${batchSelesaiBulan.length} batch</div>
        </div>
        <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Masih Gudang</div>
          <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;color:var(--accent2);margin-top:3px">${batchAktifBulan.length} batch</div>
        </div>
      </div>

      ${batchBulan.length===0
        ?`<div class="lap-no-data">📭 Tidak ada data untuk<br><strong>${nmBln} ${lapTahun}</strong></div>`
        :`<!-- Detail per peternak -->
        <div class="sl">Detail Per Peternak</div>
        ${ptIds.map(ptId=>{
          const ptBatch=batchBulan.filter(m=>m.peternakId===ptId);
          const ptNama=getPtN(ptId);
          const ptMasukKg=ptBatch.reduce((s,m)=>s+(parseFloat(m.jumlahKg)||0),0);
          const ptSelesai=ptBatch.filter(m=>getK(m.id));
          const ptKeluarKg=ptSelesai.reduce((s,m)=>{const k=getK(m.id);return s+(parseFloat(k.jumlahKg)||0);},0);
          const ptSel=ptSelesai.reduce((s,m)=>{const k=getK(m.id);return s+((parseFloat(k.jumlahKg)||0)-(parseFloat(m.jumlahKg)||0));},0);
          return `
          <div class="pt-section">
            <div class="pt-section-header">
              <div class="pt-section-av">${ptNama.charAt(0).toUpperCase()}</div>
              <div>
                <div class="pt-section-name">${ptNama}</div>
                <div class="pt-section-meta">${ptBatch.length} batch · Masuk ${fKg(ptMasukKg)} · ${ptSelesai.length>0?`Keluar ${fKg(ptKeluarKg)} · Selisih <span style="color:${ptSel>=0?'var(--plus)':'var(--minus)'}; font-weight:700">${ptSel>=0?'+':''}${fKg(ptSel)}</span>`:'Belum keluar'}</div>
              </div>
            </div>
            <!-- Tabel header -->
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:6px;padding:4px 12px;margin-bottom:2px">
              <div style="font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Tgl Masuk</div>
              <div style="font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Masuk</div>
              <div style="font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Keluar</div>
              <div style="font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;text-align:right">Selisih</div>
            </div>
            ${ptBatch.map(m=>{
              const k=getK(m.id);
              const sel=k?(parseFloat(k.jumlahKg)||0)-(parseFloat(m.jumlahKg)||0):null;
              return `<div class="lap-row">
                <div class="lr-tgl">${fTgl(m.tanggalMasuk)}</div>
                <div class="lr-masuk">${fKg(m.jumlahKg)}</div>
                <div class="lr-keluar">${k?`${fKg(k.jumlahKg)}<br><span style="font-size:.66rem;color:var(--text3)">${fTgl(k.tanggalKeluar)}</span>`:'<span style="color:var(--text3)">—</span>'}</div>
                <div class="lr-sel ${k?(sel>=0?'p':'n'):'pending'}">${k?(sel>=0?'▲':'▼')+' '+fKg(Math.abs(sel))+'<br><span style="font-weight:400;font-size:.68rem">('+fPct(Math.abs(sel),m.jumlahKg)+')</span>':'⏳'}</div>
              </div>`;}).join('')}
          </div>`;}).join('')}

        <!-- Semua batch keluar bulan ini (termasuk yg masuknya bulan lain) -->
        ${keluarBulan.filter(k=>!allM.find(m=>m.id===k.masukId&&m.tanggalMasuk.startsWith(ym))).length>0
          ?`<div class="sl">Pengiriman dari Batch Lain Bulan (${keluarBulan.filter(k=>!allM.find(m=>m.id===k.masukId&&m.tanggalMasuk.startsWith(ym))).length})</div>
          ${keluarBulan.filter(k=>!allM.find(m=>m.id===k.masukId&&m.tanggalMasuk.startsWith(ym))).map(k=>{
            const m=allM.find(x=>x.id===k.masukId);if(!m)return'';
            const sel=(parseFloat(k.jumlahKg)||0)-(parseFloat(m.jumlahKg)||0);
            return `<div class="card bc done">
              <div class="bt"><span class="ptb">${getPtN(m.peternakId)}</span><span class="tgt">${fTgl(m.tanggalMasuk)} → ${fTgl(k.tanggalKeluar)}</span></div>
              <div class="brow">
                <div class="ri"><div class="ri-l">Masuk</div><div class="ri-v">${fKg(m.jumlahKg)}</div></div>
                <div class="asep">→</div>
                <div class="ri"><div class="ri-l">Keluar</div><div class="ri-v">${fKg(k.jumlahKg)}</div></div>
                <div class="schip ${sel>=0?'pl':'mn'}">${sel>=0?'▲':'▼'} ${fKg(Math.abs(sel))}<span class="pct"> (${fPct(Math.abs(sel),m.jumlahKg)})</span></div>
              </div>
            </div>`;}).join('')}`
          :''}`
      }
    `;

    document.getElementById('btn-filter-lap').onclick=()=>{
      lapBulan=document.getElementById('f-bln').value;
      lapTahun=document.getElementById('f-thn').value;
      rLaporan();window.scrollTo(0,0);
    };
  }

  /* ════════ INFO ════════ */
  function rInfo(){
    document.getElementById('content').innerHTML=`
      <div class="ph"><div class="ph-icon">⚙️</div><div><div class="ph-title">Info</div><div class="ph-sub">Panduan &amp; tentang aplikasi</div></div></div>
      <div class="tab-row" id="tab-row-info">
        <button class="tabb" data-tab="panduan">📖 Panduan</button>
        <button class="tabb" data-tab="about">👤 Tentang</button>
        <button class="tabb" data-tab="setelan">⚙️ Setelan</button>
      </div>
      <div id="itc"></div>
    `;
    document.querySelectorAll('#tab-row-info .tabb').forEach(btn=>{
      btn.onclick=()=>switchInfoTab(btn.dataset.tab);
    });
    switchInfoTab(infoTab);
  }

      btn.classList.toggle('active',btn.dataset.tab===tab);

          pantau di gudang, lalu catat saat dikirim ke konsumen — selisih dihitung otomatis.
        </p>
      </div>
      <div class="sl">Cara Menggunakan</div>
      <div class="card">
        ${[['1','Daftarkan Peternak','Buka menu <strong>Peternak</strong> → ketik nama → Tambah. Ulangi untuk semua peternak Anda.','💡 Nama tidak boleh duplikat. Peternak hanya bisa dihapus jika belum ada data masuk.'],
           ['2','Catat Panen Masuk','Buka menu <strong>Masuk</strong> → pilih peternak → isi tanggal panen → isi berat kg → Simpan.','💡 Satu kali panen = satu batch. Misal: ambil 100 kg dari Naja tgl 1 Jan = 1 batch baru.'],
           ['3','Pantau Dashboard','Buka <strong>Beranda</strong> untuk melihat semua batch aktif di gudang beserta beratnya.','💡 Batch tampil sebagai "Aktif" selama belum dicatat keluarnya.'],
           ['4','Catat Pengiriman Keluar','Buka <strong>Keluar</strong> → pilih batch → isi berat timbang sekarang → isi tanggal kirim → Simpan.','💡 Aplikasi langsung hitung selisih dan persentase bertambah/menyusut secara otomatis.'],
           ['5','Lihat Laporan Bulanan','Buka menu <strong>Laporan</strong> → pilih bulan &amp; tahun → Tampilkan. Tersedia detail per peternak.','💡 Laporan menampilkan semua batch yang masuk bulan itu beserta status dan selisih masing-masing.']
        ].map(([n,t,p,tip])=>`
          <div class="gs"><div class="gsn">${n}</div>
          <div class="gsb"><div class="gst">${t}</div><p>${p}</p><div class="gstip">${tip}</div></div></div>`).join('')}
      </div>
      <div class="sl">Keterangan Satuan</div>
      <div class="card"><p style="font-size:.82rem;color:var(--text2);line-height:1.8">
        📌 Semua input dalam <strong>kilogram (kg)</strong>.<br>
        📌 Tampilan otomatis konversi ke <strong>kwintal (kw)</strong> jika ≥ 100 kg.<br>
        📌 Contoh: 150 kg = 1.50 kw &nbsp;·&nbsp; 300 kg = 3.00 kw
      </p></div>
    `;

    else if(tab==='about') el.innerHTML=`
      <div style="text-align:center;padding:16px 0 18px">
        <div style="font-size:3.5rem;margin-bottom:6px">🐛</div>
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;color:var(--accent2)">GudangUlat</div>
        <div style="font-size:.72rem;color:var(--text3);margin-top:3px">Versi 1.0 &nbsp;·&nbsp; 2025</div>
        <p style="font-size:.83rem;color:var(--text2);line-height:1.65;margin-top:12px;text-align:left">
          Aplikasi manajemen stok ulat hongkong yang ringan, cepat, dan nyaman dipakai dari HP.
          Dibuat khusus untuk pengepul yang butuh pencatatan sederhana namun akurat dan real-time.
        </p>
      </div>
      <div class="sl">Fitur Aplikasi</div>
      <div class="card" style="margin-bottom:12px">
        ${[['👨‍🌾','Kelola daftar peternak'],['⬇️','Catat panen masuk dari banyak peternak'],['⬆️','Catat pengiriman keluar ke konsumen'],['📊','Laporan bulanan detail per peternak'],['🔢','Hitung selisih berat & persentase otomatis'],['☁️','Data cloud Firebase — tidak hilang'],['🔐','Login password + sesi 7 hari'],['📱','Mobile-first, nyaman dari HP']]
          .map(([i,t])=>`<div class="fi"><span class="ficon">${i}</span><span>${t}</span></div>`).join('')}
      </div>
      <div class="sl">Developer</div>
      <div class="devc">
        <div class="devav">B</div>
        <div class="devn">Bayu Satrio</div>
        <div class="devr">Developer &amp; Designer · GudangUlat</div>
        <a class="dlb bwa" href="https://wa.me/+6288991568151" target="_blank">💬 Hubungi via WhatsApp</a>
        <button class="dlb bdana" onclick="window._dona()">💙 Donasi via DANA</button>
        <div class="dno">Ada request fitur, kendala, atau butuh custom?<br>Hubungi WA developer di atas.</div>
      </div>
      <div class="cmsg">
        <p>Terima kasih sudah menggunakan <strong>GudangUlat</strong>. 🐛<br>
        Semoga usaha budidaya ulat hongkong Anda semakin berkembang.<br>
        Jika membantu, donasi kecil sangat berarti bagi developer.</p>
        <div class="csign">— Bayu Satrio, Developer</div>
      </div>
    `;

    else el.innerHTML=`
      <div class="card" style="margin-bottom:10px">
        <div class="sec-title">Keamanan</div>
        <div class="sr">
          <div><div class="sl2">Ganti Password</div><div class="ssub">Ubah password login aplikasi</div></div>

  window._dona=()=>alert('💙 Donasi via DANA\n\nNomor  : 088987024458\nNama   : Bayu Satrio\n\nTerima kasih atas dukungannya! 🙏');
  window._gp=()=>{
    const o=document.getElementById('icp1').value, n=document.getElementById('icp2').value, u=document.getElementById('icp3').value;
    if(h(o)!==getPW())return toast('Password lama salah','err');
    if(n.length<4)return toast('Minimal 4 karakter','err');
    if(n!==u)return toast('Password baru tidak cocok','err');
    localStorage.setItem(KP,h(n));toast('Password berhasil diubah ✓');
    document.getElementById('cpf').classList.remove('open');
    ['icp1','icp2','icp3'].forEach(id=>{document.getElementById(id).value='';});
  };

  /* ════════ TOAST ════════ */
  let tt;
  function toast(msg,type='ok'){
    const el=document.getElementById('toast');
    el.textContent=msg;el.className=`toast show ${type}`;
    clearTimeout(tt);tt=setTimeout(()=>{el.className='toast';},2600);
  }

  /* ════════ INIT ════════ */
  window.addEventListener('DOMContentLoaded',()=>{
    document.querySelectorAll('.nb').forEach(b=>{b.onclick=()=>nav(b.dataset.page);});
    sessOK()?bootApp():initLogin();
  });
</script>
